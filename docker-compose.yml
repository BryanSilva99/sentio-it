services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: sentio
      DOCKER_INFLUXDB_INIT_PASSWORD: sentio-password
      DOCKER_INFLUXDB_INIT_ORG: sentio
      DOCKER_INFLUXDB_INIT_BUCKET: air_quality
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sentio-dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  backend:
    build: ./services/backend
    ports:
      - "8000:8000"
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: sentio/devices/+/telemetry
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: sentio-dev-token
      INFLUX_ORG: sentio
      INFLUX_BUCKET: air_quality
    depends_on:
      - mosquitto
      - influxdb

  simulator:
    build: ./services/simulator
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: sentio/devices
      SIM_INTERVAL_SECONDS: "3"
    depends_on:
      - mosquitto

volumes:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:

